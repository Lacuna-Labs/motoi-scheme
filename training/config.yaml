# Motoi Copilot — training config
# ------------------------------------------------------------------------
# Locked hparams from research/small-model-dsl-teaching-2026-07-16.slat
# section 6. Do not tune these without a corresponding update in that
# doc AND the ROADMAP.slat. When in doubt, the research doc is the spec.
# ------------------------------------------------------------------------

model:
  # Primary base — Alfred locked 2026-07-16 hour-12: "Let's do 1.5B"
  # See research/motoi-copilot-model-sizing-2026-07-16.slat for sizing
  # evidence. Backup: Qwen/Qwen2.5-Coder-3B-Instruct if verb-recall < 85%.
  base_model_id: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
  local_path: "../scratch/models/qwen2.5-coder-1.5b-instruct"
  # Chat template: Qwen2.5-Coder-Instruct ships with a chat template in
  # tokenizer_config.json — use tokenizer.apply_chat_template() directly.
  # No custom template needed.
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"  # flash_attention_2 if available on GPU

training:
  # Full fine-tune, not LoRA. Rationale in research doc section 2.
  method: "full_ft"
  epochs: 3
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.1
  max_grad_norm: 1.0
  # Effective batch 128 = per_device_train_batch_size × grad_accum × num_gpus
  # Default assumes single H100 80GB: micro-batch 4, grad-accum 32.
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 32
  # Save less often; corpus is small so checkpoints are cheap.
  save_strategy: "epoch"
  save_total_limit: 3
  logging_steps: 10
  eval_strategy: "epoch"
  # Deterministic seed — MATCHES the held-out carve seed (README.slat).
  # Re-using this seed keeps the "same seed everywhere" invariant.
  seed: 20260716

data:
  # Training corpus JSONL glob (relative to this file's parent = motoi-scheme/).
  # Loader MUST filter pairs where held_out is true. See loader in train.py.
  train_glob: "../training-data/*.jsonl"
  heldout_path: "../training-data/held-out/heldout-2026-07-16.jsonl"
  max_seq_length: 4096       # Motoi is compact; most pairs fit
  packing: false             # explicit, one pair per example
  # Skip provenance-header records ({"_provenance_header": true, ...}).
  drop_provenance_headers: true

output:
  # Absolute-safe path; adjust per run.
  output_dir: "../scratch/checkpoints/motoi-copilot-round-1"
  # Report to stdout only; wire wandb/tensorboard when running for real.
  report_to: ["none"]

eval:
  # Verb-recall probe reads assistant messages, extracts top-verb from the
  # first ```motoi fence, checks against known-verb-set for hallucination
  # rate. Implementation in train.py: verb_recall_metric().
  verb_recall_verb_list: "../scratch/motoi-core-verbs-list.slat"
  # Held-out loss + naive assistant-token match. Full MultiPL-T-style
  # composition pass@1 requires a Motoi runtime harness — a separate lane.
  compute_heldout_loss: true
  compute_verb_recall: true

hardware:
  # Assumed single H100 80GB. Consumer-hardware fallback documented in
  # README.slat under :consumer-hardware-fallback.
  target: "single_h100_80gb"
  bf16: true
  fp16: false
  gradient_checkpointing: true
